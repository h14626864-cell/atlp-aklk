<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كود QR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Tajawal',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:20px}
  .card{background:#fff;border-radius:20px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;max-width:380px;width:100%}
  .card h1{font-size:1.2rem;font-weight:800;margin-bottom:4px}
  .card .url{font-size:.78rem;color:#6b7280;direction:ltr;margin-bottom:20px;word-break:break-all}
  .qr-wrap{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:16px;display:inline-block;margin-bottom:20px}
  .qr-wrap img{width:220px;height:220px;border-radius:10px;display:block}
  .btn{padding:10px 22px;border-radius:10px;font-size:.88rem;font-weight:700;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
  .btn:hover{opacity:.85}
  .btn-primary{background:#ff6b2b;color:#fff}
  .btn-dark{background:#1a1a2e;color:#fff}
  .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .err{text-align:center;color:#ef4444;font-weight:700;font-size:1.1rem;padding:40px}
  .loading{text-align:center;color:#6b7280;font-size:.9rem;padding:40px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyC-02WpAmx1IZxPH333vhtCz6iJaqDWnq0",
  authDomain: "atlp-8dd0a.firebaseapp.com",
  projectId: "atlp-8dd0a",
  storageBucket: "atlp-8dd0a.firebasestorage.app",
  messagingSenderId: "566593290431",
  appId: "1:566593290431:web:b69710081ecdd38fbe860a",
  measurementId: "G-QJV3XD7Q3S"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>
</head>
<body>

<div id="loadingDiv" class="loading">جاري التحميل...</div>
<div id="errorDiv" class="err" style="display:none">لم يتم العثور على المطعم</div>
<div id="qrCard" class="card" style="display:none">
  <h1 id="restName">المطعم</h1>
  <div class="url" id="restUrl">-</div>
  <div class="qr-wrap">
    <img id="qrImg" src="" alt="QR Code">
  </div>
  <div class="btns">
    <button class="btn btn-primary" onclick="copyUrl()">📋 نسخ الرابط</button>
    <button class="btn btn-dark" onclick="downloadQR()">💾 تحميل QR</button>
  </div>
</div>

<script>
const QS = new URLSearchParams(location.search);
const slug = QS.get('r') || QS.get('id') || (location.pathname.replace(/^\/+|\/+$/g,'').replace(/^(qr\.html)$/, '').split('/')[0]) || null;
let menuUrl = '';

if(!slug){
  document.getElementById('loadingDiv').style.display='none';
  document.getElementById('errorDiv').style.display='block';
  document.getElementById('errorDiv').textContent='لم يتم تحديد مطعم';
} else {
  // location.origin always returns protocol + host (e.g. https://example.com)
  menuUrl = location.origin + '/' + slug;

  db.collection('restaurants').where('slug','==',slug).limit(1).get().then(snap => {
    if(snap.empty) return db.collection('restaurants').where('username','==',slug).limit(1).get();
    return Promise.resolve(snap);
  }).then(snap => {
    if(!snap || snap.empty) return db.collection('restaurants').doc(slug).get().then(doc => doc.exists ? {docs:[doc]} : {docs:[]});
    return snap;
  }).then(snap => {
    if(!snap || snap.empty || snap.docs.length === 0){
      document.getElementById('loadingDiv').style.display='none';
      document.getElementById('errorDiv').style.display='block';
      return;
    }
    const r = snap.docs[0].data();
    document.getElementById('loadingDiv').style.display='none';
    document.getElementById('qrCard').style.display='block';
    document.getElementById('restName').textContent = r.name || 'المطعم';
    document.getElementById('restUrl').textContent = menuUrl;
    document.title = 'QR - ' + (r.name || 'المنيو');
    document.getElementById('qrImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&format=png&data=' + encodeURIComponent(menuUrl);
  }).catch(err => {
    document.getElementById('loadingDiv').style.display='none';
    document.getElementById('errorDiv').style.display='block';
    document.getElementById('errorDiv').textContent = 'خطأ: ' + err.message;
  });
}

function copyUrl(){
  navigator.clipboard.writeText(menuUrl).then(() => {
    const btn = event.target.closest('.btn');
    const orig = btn.textContent;
    btn.textContent = '✅ تم النسخ';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function downloadQR(){
  window.open('https://api.qrserver.com/v1/create-qr-code/?size=600x600&format=png&data=' + encodeURIComponent(menuUrl), '_blank');
}
</script>
</body>
</html>
